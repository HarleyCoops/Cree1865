name = "cree1865-dictionary-qa-smoke"
model = "poolside/Laguna-XS.2"
max_steps = 25
batch_size = 64
rollouts_per_example = 8
learning_rate = 1e-4

[sampling]
max_tokens = 128
enable_thinking = false

[[env]]
id = "cree1865_dictionary_qa"
args = { max_examples = 1024, eval_fraction = 0.1, eval_examples = 128, seed = 1865 }

[eval]
interval = 5
num_examples = 64
rollouts_per_example = 1

[checkpoints]
interval = 25
keep_cloud = 2

[adapters]
interval = 25
keep_last = 2
