name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff
      - name: Ruff check
        run: >
          ruff check
          dakota_extraction
          dakota_rl_training
          environments
          tests
          run_inference.py
          hf_inference_standalone.py

  tests:
    name: Offline Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Pytest (OFFLINE=1)
        env:
          OFFLINE: "1"
        run: pytest -q

  package:
    name: Packaging
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check pyproject
        id: check_pyproject
        run: |
          if [ -f pyproject.toml ]; then
            echo "has_pyproject=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pyproject=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build sdist/wheel
        if: steps.check_pyproject.outputs.has_pyproject == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
